name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify Info.plist after xcodegen
        run: cat Sources/Info.plist

      - name: Build app
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version: $VERSION"
          xcodebuild \
            -project ClaudeGod.xcodeproj \
            -scheme ClaudeGod \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Claude God.app"
          DMG_NAME="ClaudeGod.dmg"

          # Create a temporary directory for the DMG contents
          mkdir -p dmg-contents
          cp -R "$APP_PATH" dmg-contents/
          ln -s /Applications dmg-contents/Applications

          # Create DMG
          hdiutil create \
            -volname "Claude God" \
            -srcfolder dmg-contents \
            -ov \
            -format UDZO \
            "$DMG_NAME"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Fallback if no changelog entry found
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/Lcharvol/Claude-God/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file to preserve formatting
          echo "$BODY" > /tmp/release-body.md
          # Append install instructions
          cat >> /tmp/release-body.md << 'INSTALL'

---

## Install

**Homebrew (recommended)**
```bash
brew tap lcharvol/tap
brew install --cask claude-god
```

**Manual** — download `ClaudeGod.dmg` below, drag to Applications, then run:
```bash
xattr -cr /Applications/Claude\ God.app
```
INSTALL

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeGod.dmg
          body_path: /tmp/release-body.md
          draft: false
